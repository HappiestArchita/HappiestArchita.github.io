    <script>
var map = L.map('map').setView([20, 0], 2);

// Base map
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

// Add markers for continents
L.marker([20, 78]).addTo(map).bindPopup("Asia");
L.marker([50, 10]).addTo(map).bindPopup("Europe");
L.marker([40, -100]).addTo(map).bindPopup("North America");
L.marker([-15, -60]).addTo(map).bindPopup("South America");
L.marker([0, 20]).addTo(map).bindPopup("Africa");
    </script>

<style>
.journey {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    align-items:center;
    gap:10px;
    margin-top:30px;
}

.step {
    background:#1e293b;
    padding:12px 18px;
    border-radius:20px;
    font-size:14px;
    border:1px solid rgba(56,189,248,0.2);
    transition:0.3s;
}

.step:hover {
    transform:translateY(-3px);
    border-color:#38bdf8;
}

.arrow {
    color:#38bdf8;
    font-size:18px;
}

.highlight {
    background:#38bdf8;
    color:black;
    font-weight:bold;
}
body {
    margin:0;
    font-family:'Segoe UI';
    background:#0f172a;
    color:#e2e8f0;
}

/* SECTION */
section {
    padding:60px 20px;
    max-width:1100px;
    margin:auto;
}

h1,h2 {
    text-align:center;
    color:#38bdf8;
}

/* CARD */
.card {
    background:#1e293b;
    padding:25px;
    border-radius:12px;
    margin-top:20px;
    transition:0.3s;
}

.card:hover {
    transform:translateY(-5px);
}

/* TIMELINE */
.timeline {
    border-left:2px solid #38bdf8;
    padding-left:20px;
}

.timeline-item {
    margin-bottom:30px;
    opacity:0;
    transform:translateY(20px);
    animation:fadeUp 0.6s forwards;
}

.timeline-item:nth-child(1){animation-delay:0.2s;}
.timeline-item:nth-child(2){animation-delay:0.4s;}
.timeline-item:nth-child(3){animation-delay:0.6s;}
.timeline-item:nth-child(4){animation-delay:0.8s;}
.timeline-item:nth-child(5){animation-delay:1s;}
.timeline-item:nth-child(6){animation-delay:1.2s;}

@keyframes fadeUp {
    to {
        opacity:1;
        transform:translateY(0);
    }
}

/* CAROUSEL */
.carousel {
    display:flex;
    overflow:hidden;
    gap:50px;
    animation:scroll 10s linear infinite;
}

.carousel img {
    height:60px;
    background:white;
    padding:20px;
    border-radius:10px;
}


@keyframes scroll {
    from {transform:translateX(0);}
    to {transform:translateX(-50%);}
}

/* IMPACT GRID */
.grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}
      nav a {
